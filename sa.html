<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Semester Result Calculator</title>
    <style>
        :root {
            --bg-color: #27E0F5;
            --card-bg: #CABCEB;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            
            /* Status Colors */
            --status-pass-bg: #dcfce7;
            --status-pass-text: #166534;
            --status-warning-bg: #fef9c3;
            --status-warning-text: #854d0e;
            --status-danger-bg: #fee2e2;
            --status-danger-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #111827;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        .result-card {
            margin-top: 30px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            background-color: #fafafa;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            color: #4b5563;
        }

        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .result-line:last-of-type {
            border-bottom: none;
        }

        .result-label {
            font-weight: 500;
            color: var(--text-muted);
        }

        .result-value {
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            text-align: right;
        }

        /* Dynamic Status Classes */
        .status-pass {
            background-color: var(--status-pass-bg);
            color: var(--status-pass-text);
        }
        .status-warning {
            background-color: var(--status-warning-bg);
            color: var(--status-warning-text);
        }
        .status-danger {
            background-color: var(--status-danger-bg);
            color: var(--status-danger-text);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Status Evaluator</h2>
    
    <!-- 1. Input Phase -->
    <div
    s="form-group">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" value="John Doe" placeholder="Enter student's name">
    </div>

    <div class="row">
        <div class="form-group">
            <label for="absences">Absences</label>
            <input type="number" id="absences" value="0" min="0" max="100">
        </div>
        <div class="form-group">
            <label for="midtermScore">Midterm Score</label>
            <input type="number" id="midtermScore" value="0" min="0" max="50">
        </div>
        <div class="form-group">
            <label for="finalScore">Final Score</label>
            <input type="number" id="finalScore" value="0" min="0" max="50">
        </div>
    </div>

    <!-- 4. Output Phase Box -->
    <div class="result-card">
        <div class="result-title">--- Student Semester Result ---</div>
        
        <div class="result-line">
            <span class="result-label">Student Name:</span>
            <span class="result-value" id="outName">-</span>
        </div>
        <div class="result-line">
            <span class="result-label">Midterm Score:</span>
            <span class="result-value" id="outMidterm">0</span>
        </div>
        <div class="result-line">
            <span class="result-label">Final Score:</span>
            <span class="result-value" id="outFinal">0</span>
        </div>
        <div class="result-line">
            <span class="result-label">Total Score:</span>
            <span class="result-value" id="outTotal">0</span>
        </div>
        <div class="result-line" style="align-items: center; margin-top: 10px;">
            <span class="result-label">Final Status:</span>
            <span class="status-badge" id="outStatus">-</span>
        </div>
    </div>
</div>

<script>
    // Grab DOM elements
    const studentNameInput = document.getElementById('studentName');
    const absencesInput = document.getElementById('absences');
    const midtermInput = document.getElementById('midtermScore');
    const finalInput = document.getElementById('finalScore');

    const outName = document.getElementById('outName');
    const outMidterm = document.getElementById('outMidterm');
    const outFinal = document.getElementById('outFinal');
    const outTotal = document.getElementById('outTotal');
    const outStatus = document.getElementById('outStatus');

    function calculateResult() {
        // 1. Input Processing
        const name = studentNameInput.value || "N/A";
        const absences = parseInt(absencesInput.value) || 0;
        const midtermScore = parseFloat(midtermInput.value) || 0;
        const finalScore = parseFloat(finalInput.value) || 0;

        // 2. Calculation Phase
        const totalScore = midtermScore + finalScore;

        // 3. Conditional Logic Phase (Strictly mirrored from your pseudocode)
        let resultStatus = "";
        let statusClass = "";

        if (absences >= 16) {
            resultStatus = "Not allowed to exam / Must retake course";
            statusClass = "status-danger";
        } 
        else if (absences >= 11 && absences <= 15) {
            resultStatus = "Not allowed for regular exam / Must take re-exam";
            statusClass = "status-warning";
        } 
        else { // Handles Absences <= 10
            if (midtermScore < 20) {
                resultStatus = "Must retake course";
                statusClass = "status-danger";
            } 
            else if (midtermScore >= 20 && totalScore < 60) {
                resultStatus = "Must take a makeup/re-exam";
                statusClass = "status-warning";
            } 
            else if (midtermScore >= 20 && totalScore >= 60) {
                resultStatus = "Passed";
                statusClass = "status-pass";
            }
        }

        // 4. Output Phase Updates
        outName.textContent = name;
        outMidterm.textContent = midtermScore;
        outFinal.textContent = finalScore;
        outTotal.textContent = totalScore;
        
        outStatus.textContent = resultSt
        atus;
        // Reset and apply proper badge styling color
        outStatus.className = "status-badge " + statusClass;
    }

    // Attach real-time event listeners
    studentNameInput.addEventListener('input', calculateResult);
    absencesInput.addEventListener('input', calculateResult);
    midtermInput.addEventListener('input', calculateResult);
    finalInput.addEventListener('input', calculateResult);

    // Initial run on load
    calculateResult();
</script>

</body>
</html>
