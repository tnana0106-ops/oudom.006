<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electricity Cost Calculator</title>

<style>
body{
    font-family: Arial;
    background:#0000;
    color:white;
}
.box{
    width:400px;
    margin:60px auto;
    background:#1e293b;
    padding:25px;
    border-radius:10px;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}
button{
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}
.result{
    background:#ff4d4d;
    padding:15px;
    margin-top:15px;
    border-radius:6px;
    display:none;
}
</style>
</head>
<body>

<div class="box">
<h2> គណនាថ្លៃអគ្គិសនី</h2>

គីឡូចាស់ (kWh)
<input type="number" id="old" placeholder="Enter kWh">

Price per kWh (៛)
<input type="number" id="price" placeholder="Enter price">

<button onclick="calculate()">គណនាទឹកប្រាក់</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){
    let old = document.getElementById("old").value;
    let price = document.getElementById("price").value;

    if(old=="" || price==""){
        alert("Please enter all values");
        return;
    }

    let used = old;
    let total = used * price;

    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML =
        "Used Electricity: <b>" + used + " kWh</b><br>" +
        "Total Cost: <b>" + total.toLocaleString() + " ៛</b>";
}
</script>

</body>
</html>
